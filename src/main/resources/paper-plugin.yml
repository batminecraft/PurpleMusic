name: PurpleMusic
version: '${plugin_version}'
main: fr.batmultifonction.purplemusic.PurpleMusic
description: A Simple Voice Chat powered music plugin. Play tracks to players, build queues, and create music zones.
authors: [ "BatMultifonction" ]
api-version: '${bukkit_api_version}'
bootstrapper: fr.batmultifonction.purplemusic.PurpleMusicBootstrap
folia-supported: true

dependencies:
  server:
    voicechat:
      load: BEFORE
      required: true
      join-classpath: true

permissions:
  purplemusic.*:
    description: Grants all PurpleMusic permissions
    default: op
    children:
      purplemusic.download: true
      purplemusic.play: true
      purplemusic.stop: true
      purplemusic.queue: true
      purplemusic.playlist: true
      purplemusic.zone: true
      purplemusic.reload: true
      purplemusic.list: true
  purplemusic.download:
    description: Allows downloading audio files
    default: op
  purplemusic.play:
    description: Allows playing audio to players
    default: op
  purplemusic.stop:
    description: Allows stopping playback
    default: op
  purplemusic.queue:
    description: Allows managing player queues
    default: op
  purplemusic.playlist:
    description: Allows managing playlists
    default: op
  purplemusic.zone:
    description: Allows managing music zones
    default: op
  purplemusic.reload:
    description: Allows reloading the plugin
    default: op
  purplemusic.list:
    description: Allows listing tracks/playlists/zones
    default: op
